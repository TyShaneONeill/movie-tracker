version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Chicago
    open-pull-requests-limit: 5
    # Expo SDK owns these version pins — upgrade via `npx expo install --fix`
    # / SDK upgrades, never standalone bumps. Alerts still fire for them.
    ignore:
      - dependency-name: expo
      - dependency-name: "expo-*"
      - dependency-name: "@expo/*"
      - dependency-name: react-native
      - dependency-name: "react-native-*"
      - dependency-name: "@react-native/*"
      - dependency-name: "@react-native-community/*"
      - dependency-name: jest-expo
      - dependency-name: babel-preset-expo
      - dependency-name: react
      - dependency-name: react-dom
    groups:
      minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Chicago
    open-pull-requests-limit: 2
    groups:
      actions:
        applies-to: version-updates
        update-types:
          - minor
          - patch
    commit-message:
      prefix: "chore(ci)"
