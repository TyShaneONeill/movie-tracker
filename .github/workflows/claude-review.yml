name: Claude PR Review

on:
  pull_request:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  review:
    # Run on every newly-opened PR, OR when someone comments "@claude review" on a PR
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       contains(github.event.comment.body, '@claude review'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this pull request for:
            - Bugs, logic errors, and edge cases that could fail in production
            - Security issues (auth, RLS, secret handling, injection, XSS)
            - React/React Native pitfalls (stale closures, missing deps in useCallback/useEffect, unnecessary re-renders)
            - Supabase patterns (RLS policies, service role misuse, unhandled error branches)
            - TypeScript type safety gaps (any, unchecked null, missing return types)
            - Tests and whether the change needs new coverage
            - Adherence to the project conventions in CLAUDE.md (branch naming, commit style, file structure)

            Follow these review principles:
            - Focus on the diff, not the whole codebase
            - High-signal comments only — skip nits about formatting or style that linters catch
            - Reference specific file paths and line numbers
            - If the PR looks good, say so briefly rather than manufacturing issues
            - Flag any use of secrets, destructive migrations, or changes to RLS policies for extra scrutiny

            Post findings as a single PR review comment with sections:
            ## Summary
            ## Must Fix (blocks merge)
            ## Should Fix (recommended before merge)
            ## Nice to Have (follow-up)
            ## Good Patterns (call out what's done well)
