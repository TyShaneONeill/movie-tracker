title = "CineTrak gitleaks config"

[extend]
useDefault = true

[[rules]]
id = "discord-webhook-url"
description = "Discord webhook URL"
regex = '''https://discord(?:app)?\.com/api/webhooks/[0-9]+/[A-Za-z0-9_-]+'''
tags = ["webhook", "discord"]

[[rules]]
id = "supabase-service-role-key"
description = "Supabase service role JWT (legacy) or sb_secret_ key"
regex = '''(?:eyJ[A-Za-z0-9_-]{20,}\.eyJ[A-Za-z0-9_-]{20,}\.[A-Za-z0-9_-]{20,}|sb_secret_[A-Za-z0-9_-]{20,})'''
tags = ["supabase", "key"]

[allowlist]
description = "Paths and patterns that are intentionally not secrets"
paths = [
  '''\.env\.example$''',
  '''^web-build-test/''',
  '''^dist/''',
  '''^docs/credential-audit-post-rebrand\.md$''',
  '''^Projects/CineTrak/Security/''',
  '''^\.gitleaks\.toml$''',
  # google-services.json holds Android client identifiers (the API key is restricted
  # by package + SHA and ships inside the APK) — intentionally committed, not a secret.
  '''^google-services\.json$''',
]
regexes = [
  '''placeholder''',
  '''<.+?>''',
  '''example\.com''',
]
