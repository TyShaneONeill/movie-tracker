<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1024px;
    height: 500px;
    overflow: hidden;
    background: #111111;
    font-family: 'Inter', sans-serif;
  }

  .container {
    width: 1024px;
    height: 500px;
    display: flex;
    align-items: center;
    position: relative;
    overflow: hidden;
  }

  /* Subtle red glow behind icon */
  .glow {
    position: absolute;
    left: -60px;
    top: 50%;
    transform: translateY(-50%);
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(225,29,72,0.1) 0%, transparent 65%);
    pointer-events: none;
  }

  /* Icon */
  .icon-wrap {
    width: 380px;
    height: 500px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    position: relative;
  }

  .icon-wrap img {
    width: 300px;
    height: 300px;
    object-fit: contain;
  }

  /* Vertical divider */
  .divider {
    width: 1px;
    height: 260px;
    background: rgba(255,255,255,0.08);
    flex-shrink: 0;
  }

  /* Text side */
  .text-side {
    flex: 1;
    padding: 0 56px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .wordmark {
    font-family: 'Outfit', sans-serif;
    font-size: 68px;
    font-weight: 800;
    color: #e11d48;
    letter-spacing: -1px;
    line-height: 1;
  }

  .tagline {
    font-family: 'Outfit', sans-serif;
    font-size: 20px;
    font-weight: 600;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.2px;
    line-height: 1.4;
    margin-top: 2px;
  }

  .features {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 12px;
  }

  .feature {
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    color: rgba(255,255,255,0.65);
    font-weight: 400;
  }

  .dot {
    width: 5px;
    height: 5px;
    background: #e11d48;
    border-radius: 50%;
    flex-shrink: 0;
  }
</style>
</head>
<body>
<div class="container">
  <div class="glow"></div>

  <div class="icon-wrap">
    <img src="file:///Users/tyshaneoneill/Documents/movie-tracker-app/cinetrak/assets/images/PocketStubs_Logo_Trans.png" />
  </div>

  <div class="divider"></div>

  <div class="text-side">
    <div class="wordmark">PocketStubs</div>
    <div class="tagline">Discover & Track</div>
    <div class="features">
      <div class="feature"><div class="dot"></div>Movie & TV tracking with ratings and reviews</div>
      <div class="feature"><div class="dot"></div>Ticket stub scanning — log theaters instantly</div>
      <div class="feature"><div class="dot"></div>Social feed, AI journey art, and premium features</div>
    </div>
  </div>
</div>
</body>
</html>
