<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - CineTrak</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #09090b;
      color: #fafafa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    .container { max-width: 400px; }
    h1 { font-size: 1.5rem; margin-bottom: 1rem; }
    p { color: #a1a1aa; margin-bottom: 1.5rem; line-height: 1.6; }
    .btn {
      display: inline-block;
      padding: 14px 28px;
      background: linear-gradient(135deg, #e11d48 0%, #be123c 100%);
      color: white;
      text-decoration: none;
      border-radius: 9999px;
      font-weight: 600;
    }
  </style>
  <script>
    // Try to open the app with the current URL parameters
    window.onload = function() {
      const params = window.location.search;
      const appUrl = 'cinetrak://reset-password' + params;
      window.location.href = appUrl;
    };
  </script>
</head>
<body>
  <div class="container">
    <h1>Opening CineTrak...</h1>
    <p>If the app doesn't open automatically, make sure you have CineTrak installed.</p>
    <a href="https://apps.apple.com/app/cinetrak" class="btn">Get CineTrak</a>
  </div>
</body>
</html>
