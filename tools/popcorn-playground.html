<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Popcorn Physics Playground</title>
<!--
  PORT of lib/physics-engine.ts — keep in sync if you change the engine.
  Open in any browser: `open tools/popcorn-playground.html` or
  `python3 -m http.server` then visit http://localhost:8000/tools/

  Controls:
    • Drag mouse over canvas  = tilt phone (cursor away from center = "down")
    • Right-click             = shake / impulse
    • Space                   = reset bag
    • R                       = randomize defaults to current sliders
    • C                       = copy current config to clipboard (paste into DEFAULT_PHYSICS_CONFIG)

  The engine code below is a 1:1 vanilla-JS port of lib/physics-engine.ts.
  When you find values that feel right, the slider readout maps directly to
  PhysicsConfig fields in the real engine.
-->
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", monospace;
    background: #1a1a1a;
    color: #e8e8e8;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }
  #canvas-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    background: #2a2a2a;
  }
  #canvas {
    background: #fafafa;
    border: 2px solid #444;
    cursor: crosshair;
  }
  #hint {
    position: absolute;
    top: 12px;
    left: 12px;
    padding: 8px 12px;
    background: rgba(0,0,0,0.7);
    color: #ccc;
    border-radius: 6px;
    font-size: 12px;
    line-height: 1.5;
    pointer-events: none;
  }
  #status {
    position: absolute;
    top: 12px;
    right: 12px;
    padding: 6px 10px;
    background: rgba(0,0,0,0.7);
    color: #4af;
    border-radius: 6px;
    font-family: monospace;
    font-size: 11px;
  }
  #panel {
    width: 360px;
    background: #232323;
    padding: 16px 20px;
    overflow-y: auto;
    border-left: 1px solid #444;
  }
  #panel h2 { font-size: 14px; margin-bottom: 12px; color: #f5d76e; }
  #panel h3 { font-size: 11px; margin-top: 16px; margin-bottom: 6px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
  .slider-row {
    margin-bottom: 10px;
  }
  .slider-row label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    margin-bottom: 4px;
  }
  .slider-row label .key { color: #ddd; }
  .slider-row label .val { color: #4af; font-family: monospace; }
  .slider-row input {
    width: 100%;
    accent-color: #4af;
  }
  button {
    background: #333;
    color: #ddd;
    border: 1px solid #555;
    padding: 6px 12px;
    font-size: 12px;
    border-radius: 4px;
    cursor: pointer;
    margin-right: 6px;
    margin-top: 6px;
  }
  button:hover { background: #444; border-color: #777; }
  button.primary { background: #4af; color: #000; border-color: #4af; }
  #copy-output {
    width: 100%;
    margin-top: 12px;
    background: #1a1a1a;
    border: 1px solid #444;
    color: #4af;
    padding: 8px;
    font-family: monospace;
    font-size: 10px;
    border-radius: 4px;
    min-height: 100px;
    resize: vertical;
  }
</style>
</head>
<body>

<div id="canvas-wrap">
  <canvas id="canvas" width="420" height="700"></canvas>
  <div id="hint">
    drag = tilt · right-click = shake<br>
    space = reset · C = copy config · R = repopulate
  </div>
  <div id="status">FPS: 60 · gravity: (0, 1)</div>
</div>

<div id="panel">
  <h2>Physics Tuner</h2>

  <h3>Forces</h3>
  <div id="sliders"></div>

  <h3>Setup</h3>
  <div class="slider-row">
    <label><span class="key">kernelCount</span><span class="val" id="val-kernelCount">30</span></label>
    <input type="range" min="1" max="120" step="1" value="30" id="kernelCount">
  </div>

  <h3>Actions</h3>
  <button id="btn-reset">Reset bag</button>
  <button id="btn-shake" class="primary">Shake (right-click also)</button>
  <button id="btn-copy">Copy config</button>

  <h3>Config (paste into DEFAULT_PHYSICS_CONFIG)</h3>
  <textarea id="copy-output" readonly></textarea>
</div>

<script>
//=============================================================================
// PHYSICS ENGINE PORT — keep in sync with lib/physics-engine.ts
//=============================================================================

const REFERENCE_RADIUS = 17;
const SLEEP_THRESHOLD = 0.08;
const FRAMES_TO_FREEZE = 8;
const DAMPING = 0.91;
const RESTITUTION = 0.38;

function stepPhysics(particles, gx, gy, bounds, dt, cfg) {
  const damping = cfg.damping;
  const restitution = cfg.restitution;
  const overlapCorrection = cfg.overlapCorrection;
  const dragCoeff = cfg.airDrag;
  const friction = cfg.kernelFriction;
  const angularDamping = cfg.angularDamping ?? 0.92;
  const angularKickWall = cfg.angularKickWall ?? 0.10;
  const angularKickCollision = cfg.angularKickCollision ?? 0.20;
  const sleepThreshold = cfg.sleepThreshold ?? SLEEP_THRESHOLD;
  const framesToFreeze = cfg.framesToFreeze ?? FRAMES_TO_FREEZE;
  const personalityStrength = cfg.personalityStrength ?? 1.0;
  const massResponseStrength = cfg.massResponseStrength ?? 1.0;
  const wallAbsorption = cfg.wallAbsorption ?? 0;
  const wallBounce = restitution * (1 - wallAbsorption);
  const solverIterations = Math.max(1, Math.floor(cfg.solverIterations ?? 1));

  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    if (p.frozen) continue;

    const rawPersonality = p.personality ?? 1;
    const scaledPersonality = 1 + (rawPersonality - 1) * personalityStrength;
    const rawMassResponse = REFERENCE_RADIUS / p.radius;
    const scaledMassResponse = 1 + (rawMassResponse - 1) * massResponseStrength;
    const massResponse = scaledMassResponse * scaledPersonality;
    p.vx += gx * dt * massResponse;
    p.vy += gy * dt * massResponse;

    p.x += p.vx * dt;
    p.y += p.vy * dt;

    if (p.x - p.radius < 0) {
      p.x = p.radius; p.vx = Math.abs(p.vx) * wallBounce;
      p.angularVelocity = (p.angularVelocity ?? 0) - (p.vy / p.radius) * angularKickWall;
    }
    if (p.x + p.radius > bounds.w) {
      p.x = bounds.w - p.radius; p.vx = -Math.abs(p.vx) * wallBounce;
      p.angularVelocity = (p.angularVelocity ?? 0) + (p.vy / p.radius) * angularKickWall;
    }
    if (p.y - p.radius < 0) {
      p.y = p.radius; p.vy = Math.abs(p.vy) * wallBounce;
      p.angularVelocity = (p.angularVelocity ?? 0) + (p.vx / p.radius) * angularKickWall;
    }
    if (p.y + p.radius > bounds.h) {
      p.y = bounds.h - p.radius; p.vy = -Math.abs(p.vy) * wallBounce;
      p.angularVelocity = (p.angularVelocity ?? 0) + (p.vx / p.radius) * angularKickWall;
    }

    let speedScale = 1;
    if (dragCoeff > 0) {
      const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
      if (speed > 0) {
        const dragForce = (dragCoeff / p.radius) * speed * speed;
        const newSpeed = Math.max(0, speed - dragForce * dt);
        speedScale = newSpeed / speed;
      }
    }
    p.vx *= damping * speedScale;
    p.vy *= damping * speedScale;

    const angVel = p.angularVelocity ?? 0;
    p.rotation = (p.rotation ?? 0) + angVel * dt;
    p.angularVelocity = angVel * angularDamping;

    if (Math.abs(p.vx) < sleepThreshold && Math.abs(p.vy) < sleepThreshold) {
      p.frozenFrames++;
      if (p.frozenFrames >= framesToFreeze) {
        p.vx = 0; p.vy = 0; p.frozen = true;
      }
    } else {
      p.frozenFrames = 0;
    }
  }

  for (let iter = 0; iter < solverIterations; iter++) {
    const isFirstIter = iter === 0;
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const a = particles[i], b = particles[j];
        if (a.frozen && b.frozen) continue;
        const dx = b.x - a.x, dy = b.y - a.y;
        const distSq = dx * dx + dy * dy;
        const minDist = a.radius + b.radius;
        if (distSq < minDist * minDist && distSq > 0) {
          const dist = Math.sqrt(distSq);
          const overlap = (minDist - dist) * overlapCorrection;
          const nx = dx / dist, ny = dy / dist;
          if (!a.frozen) { a.x -= nx * overlap; a.y -= ny * overlap; }
          if (!b.frozen) { b.x += nx * overlap; b.y += ny * overlap; }

          if (isFirstIter && friction > 0) {
            const tx = -ny, ty = nx;
            const relTangentRaw = (a.vx - b.vx) * tx + (a.vy - b.vy) * ty;
            const relTangent = relTangentRaw * friction * 0.5;
            if (!a.frozen) { a.vx -= relTangent * tx; a.vy -= relTangent * ty; }
            if (!b.frozen) { b.vx += relTangent * tx; b.vy += relTangent * ty; }
            const angularKick = relTangentRaw * friction * angularKickCollision;
            if (!a.frozen) a.angularVelocity = (a.angularVelocity ?? 0) - angularKick / a.radius;
            if (!b.frozen) b.angularVelocity = (b.angularVelocity ?? 0) + angularKick / b.radius;
          }
        }
      }
    }
  }
}

function applyImpulse(particles, magnitude, gx, gy) {
  const gMag = Math.sqrt(gx * gx + gy * gy);
  if (gMag === 0) return;
  const ix = -(gx / gMag) * magnitude;
  const iy = -(gy / gMag) * magnitude;
  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    p.frozen = false;
    p.frozenFrames = 0;
    p.vx += ix;
    p.vy += iy;
  }
}

function wake(particles) {
  for (let i = 0; i < particles.length; i++) {
    particles[i].frozen = false;
    particles[i].frozenFrames = 0;
  }
}

//=============================================================================
// SEEDED HELPERS — small port from lib/kernel-generator.ts
//=============================================================================
function makeLCG(seed) {
  let s = seed >>> 0;
  return () => {
    s = (Math.imul(s, 1664525) + 1013904223) >>> 0;
    return s / 0xFFFFFFFF;
  };
}
function kernelSize(seed) {
  const rng = makeLCG(seed ^ 0xDEADBEEF);
  return 28 + Math.floor(rng() * 15);
}
function kernelPersonality(seed) {
  const rng = makeLCG(seed ^ 0xCAFEBABE);
  return 0.85 + rng() * 0.30;
}

//=============================================================================
// CONFIG — these defaults match lib/physics-engine.ts DEFAULT_PHYSICS_CONFIG
//=============================================================================
const config = {
  gravity: 7.20,
  damping: 0.50,
  restitution: 0.00,
  maxSpeed: 30.00,
  overlapCorrection: 0.05,
  airDrag: 0.50,
  kernelFriction: 1.00,
  jumpImpulse: 0.00,
  jumpThreshold: 3.00,
  angularDamping: 0.50,
  angularKickWall: 0.00,
  angularKickCollision: 0.00,
  sleepThreshold: 0.01,
  framesToFreeze: 1,
  personalityStrength: 3.00,
  massResponseStrength: 3.00,
  wallAbsorption: 1.00,
  solverIterations: 5,
  tiltDeadband: 0.10,
};

const SLIDER_DEFS = [
  { key: 'gravity',           min: 0,    max: 40,   step: 0.1 },
  { key: 'damping',           min: 0.5,  max: 1.0,  step: 0.005 },
  { key: 'restitution',       min: 0,    max: 1.0,  step: 0.01 },
  { key: 'overlapCorrection', min: 0.05, max: 1.0,  step: 0.05 },
  { key: 'airDrag',           min: 0,    max: 0.5,  step: 0.005 },
  { key: 'kernelFriction',    min: 0,    max: 1.0,  step: 0.005 },
  { key: 'jumpImpulse',       min: 0,    max: 80,   step: 0.5 },
  { key: 'angularDamping',    min: 0.5,  max: 1.0,  step: 0.005 },
  { key: 'angularKickWall',   min: 0,    max: 1.0,  step: 0.01 },
  { key: 'angularKickCollision', min: 0, max: 1.0,  step: 0.01 },
  { key: 'sleepThreshold',    min: 0.01, max: 0.5,  step: 0.005 },
  { key: 'framesToFreeze',    min: 1,    max: 60,   step: 1 },
  { key: 'personalityStrength', min: 0,  max: 3,    step: 0.05 },
  { key: 'massResponseStrength', min: 0, max: 3,    step: 0.05 },
  { key: 'wallAbsorption',    min: 0,    max: 1,    step: 0.01 },
  { key: 'solverIterations',  min: 1,    max: 5,    step: 1 },
  { key: 'tiltDeadband',      min: 0,    max: 0.5,  step: 0.005 },
];

//=============================================================================
// RENDERING + LOOP
//=============================================================================
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const bounds = { w: canvas.width, h: canvas.height };

let particles = [];
let kernelCount = 30;
let mouseDown = false;
let gravityVec = { gx: 0, gy: 1 }; // default down

function spawnKernels(n) {
  particles = [];
  for (let i = 0; i < n; i++) {
    const seed = (i + 1) * 12345 + Math.floor(Math.random() * 1000);
    const r = kernelSize(seed) / 2;
    particles.push({
      x: bounds.w * 0.15 + Math.random() * bounds.w * 0.7,
      y: -r * 2 - i * 12,
      vx: (Math.random() - 0.5) * 1.0,
      vy: 18 + Math.random() * 8,
      radius: r,
      frozen: false,
      frozenFrames: 0,
      personality: kernelPersonality(seed),
      rotation: Math.random() * Math.PI * 2,
      seed,
    });
  }
}

function drawKernel(p) {
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.rotate(p.rotation ?? 0);
  // Approximate popcorn shape with a 7-pointed star-ish polygon
  const baseR = p.radius * 0.8;
  const rng = makeLCG(p.seed ^ 0xABCD1234);
  ctx.beginPath();
  for (let i = 0; i < 7; i++) {
    const a = (i / 7) * Math.PI * 2;
    const r = baseR * (0.75 + rng() * 0.5);
    const x = Math.cos(a) * r;
    const y = Math.sin(a) * r;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fillStyle = '#F5D76E';
  ctx.fill();
  ctx.strokeStyle = '#1A1208';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.restore();
}

function drawGravityIndicator() {
  // Show current gravity vector as an arrow from canvas center
  const cx = bounds.w / 2;
  const cy = 30;
  const len = 20;
  const endX = cx + gravityVec.gx * len;
  const endY = cy + gravityVec.gy * len;
  ctx.save();
  ctx.strokeStyle = '#4af';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(endX, endY);
  ctx.stroke();
  ctx.fillStyle = '#4af';
  ctx.beginPath();
  ctx.arc(endX, endY, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

let lastFrame = performance.now();
let fps = 60;
let fpsAvg = 60;

function loop() {
  const now = performance.now();
  const elapsed = now - lastFrame;
  lastFrame = now;
  fps = 1000 / Math.max(1, elapsed);
  fpsAvg = fpsAvg * 0.9 + fps * 0.1;
  const dt = Math.min(elapsed / 16.67, 1.5);

  // Apply gravity vector (already a unit vector when mouse active, default (0,1))
  const gx = gravityVec.gx * config.gravity;
  const gy = gravityVec.gy * config.gravity;
  stepPhysics(particles, gx, gy, bounds, dt, config);

  // Render
  ctx.fillStyle = '#fafafa';
  ctx.fillRect(0, 0, bounds.w, bounds.h);
  for (const p of particles) drawKernel(p);
  drawGravityIndicator();

  document.getElementById('status').textContent =
    `FPS: ${fpsAvg.toFixed(0)} · gravity: (${gravityVec.gx.toFixed(2)}, ${gravityVec.gy.toFixed(2)}) · kernels: ${particles.length} (${particles.filter(p => p.frozen).length} settled)`;

  requestAnimationFrame(loop);
}

//=============================================================================
// CONTROLS
//=============================================================================
function buildSliders() {
  const root = document.getElementById('sliders');
  root.innerHTML = '';
  SLIDER_DEFS.forEach(({ key, min, max, step }) => {
    const row = document.createElement('div');
    row.className = 'slider-row';
    const label = document.createElement('label');
    label.innerHTML = `<span class="key">${key}</span><span class="val" id="val-${key}">${config[key].toFixed(3)}</span>`;
    const input = document.createElement('input');
    input.type = 'range';
    input.min = min; input.max = max; input.step = step;
    input.value = config[key];
    input.addEventListener('input', (e) => {
      config[key] = parseFloat(e.target.value);
      document.getElementById(`val-${key}`).textContent = config[key].toFixed(3);
    });
    row.appendChild(label);
    row.appendChild(input);
    root.appendChild(row);
  });
}

document.getElementById('kernelCount').addEventListener('input', (e) => {
  kernelCount = parseInt(e.target.value, 10);
  document.getElementById('val-kernelCount').textContent = kernelCount;
  spawnKernels(kernelCount);
});

document.getElementById('btn-reset').addEventListener('click', () => spawnKernels(kernelCount));
document.getElementById('btn-shake').addEventListener('click', () => {
  applyImpulse(particles, config.jumpImpulse, gravityVec.gx, gravityVec.gy);
});
document.getElementById('btn-copy').addEventListener('click', copyConfig);

function copyConfig() {
  const lines = Object.entries(config)
    .map(([k, v]) => `  ${k}: ${typeof v === 'number' ? v.toFixed(2) : v},`)
    .join('\n');
  const txt = `export const DEFAULT_PHYSICS_CONFIG: PhysicsConfig = {\n${lines}\n};`;
  document.getElementById('copy-output').value = txt;
  navigator.clipboard?.writeText(txt);
}

// Mouse → gravity vector. Position relative to canvas center → unit vector.
// Apply same deadband as the production orchestrator so playground matches feel.
canvas.addEventListener('mousemove', (e) => {
  if (!mouseDown) return;
  const rect = canvas.getBoundingClientRect();
  const dx = (e.clientX - rect.left) - bounds.w / 2;
  const dy = (e.clientY - rect.top)  - bounds.h / 2;
  const mag = Math.sqrt(dx*dx + dy*dy);
  if (mag > 1) {
    const ux = dx / mag, uy = dy / mag;
    const dead = config.tiltDeadband ?? 0;
    const sign = ux > 0 ? 1 : -1;
    const fx = dead > 0 ? sign * Math.max(0, Math.abs(ux) - dead) : ux;
    const m = Math.sqrt(fx*fx + uy*uy);
    if (m > 0.01) {
      gravityVec = { gx: fx / m, gy: uy / m };
    } else {
      gravityVec = { gx: 0, gy: 1 };
    }
    wake(particles);
  }
});

canvas.addEventListener('mousedown', (e) => {
  if (e.button === 2) {
    e.preventDefault();
    applyImpulse(particles, config.jumpImpulse, gravityVec.gx, gravityVec.gy);
    return;
  }
  mouseDown = true;
});

canvas.addEventListener('mouseup', () => {
  mouseDown = false;
  // gravity stays at last set direction; release does NOT reset
});

canvas.addEventListener('contextmenu', (e) => e.preventDefault());

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); spawnKernels(kernelCount); }
  if (e.key === 'c' || e.key === 'C') copyConfig();
  if (e.key === 'r' || e.key === 'R') spawnKernels(kernelCount);
});

//=============================================================================
// BOOT
//=============================================================================
buildSliders();
spawnKernels(kernelCount);
loop();

</script>

</body>
</html>
